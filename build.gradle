plugins {
	id 'net.fabricmc.fabric-loom-remap' version "${loom_version}"
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

loom {
	accessWidenerPath = file("src/main/resources/kaleidoscope_tavern.accesswidener")
}

repositories {
	maven {
		  name = "Terraformers"
		  url = "https://maven.terraformersmc.com/"}
	  maven { url = "https://api.modrinth.com/maven"}
	  maven {
		  // location of the maven that hosts JEI files before January 2023
		  name = "Progwml6's maven"
		  url = "https://dvs1.progwml6.com/files/maven/"
	  }
	  maven {
		  // location of the maven that hosts JEI files since January 2023
		  name = "Jared's maven"
		  url = "https://maven.blamejared.com/"
	  }
	  maven {
		  // location of a maven mirror for JEI files, as a fallback
		  name = "ModMaven"
		  url = "https://modmaven.dev"
	  }
	  maven {
		url = "https://maven.shedaniel.me"
	  }
	  maven {
		url = "https://maven.architectury.dev"
		content {
			includeGroup "dev.architectury"
		}
	  }
	maven {
		url "https://cursemaven.com"
	}
	maven { url "https://maven.shedaniel.me/" }
	maven { url "https://maven.terraformersmc.com/releases/" }
}

dependencies {
	// To change the versions see the gradle.properties file
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings loom.officialMojangMappings()
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
	modImplementation "curse.maven:create-fly-1346281:7658527"
	modImplementation "maven.modrinth:jade:${project.jade_version}"
	modCompileOnly("mezz.jei:jei-1.21.11-fabric:27.4.0.15")
	// Fabric API. This is technically optional, but you probably want it anyway.
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"

	// REI 前置
	modImplementation "me.shedaniel.cloth:cloth-config-fabric:21.11.153"
	modImplementation "dev.architectury:architectury-fabric:19.0.1"
	// REI API for Fabric
	modCompileOnly "me.shedaniel:RoughlyEnoughItems-api-fabric:21.11.814"
	modCompileOnly "me.shedaniel:RoughlyEnoughItems-default-plugin-fabric:21.11.814"
	modRuntimeOnly "maven.modrinth:rei:21.11.814+fabric-fabric,1.21.11"
	
}

processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": inputs.properties.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 21
}

java {
	// Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
	// if it is present.
	// If you remove this line, sources will not be generated.
	withSourcesJar()

	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
}

jar {
	inputs.property "archivesName", project.base.archivesName

	from("LICENSE") {
		rename { "${it}_${inputs.properties.archivesName}"}
	}
}

// configure the maven publication
publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
		}
	}

	// See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
	repositories {
		// Add repositories to publish to here.
		// Notice: This block does NOT have the same function as the block in the top level.
		// The repositories here will be used for publishing your artifact, not for
		// retrieving dependencies.
	}
}